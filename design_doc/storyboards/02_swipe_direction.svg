<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="330" viewBox="0 0 1060 330" font-family="Helvetica, Arial, sans-serif">
  <style>
    .panel { fill:#ffffff; stroke:#c9ced6; stroke-width:1.5; }
    .bar { fill:#eef2f7; }
    .title { font-size:13px; font-weight:bold; fill:#1a2433; }
    .cap { font-size:11.5px; fill:#3c4654; }
    .floor { stroke:#2b8a8f; stroke-width:3; }
    .swipe { stroke:#e0473c; stroke-width:4; }
    .person { stroke:#222; stroke-width:2.5; fill:none; }
    .agentBody { fill:#2f56c9; }
    .label { font-size:10.5px; fill:#5b6675; }
    .palm { fill:none; stroke:#c98a2f; stroke-width:8; stroke-linecap:round; }
  </style>
  <text x="20" y="22" class="title">Storyboard 2 (alternative): Open palm swipe sets the travel direction</text>

  <g transform="translate(20,38)">
    <rect class="panel" width="240" height="250" rx="6"/>
    <rect class="bar" width="240" height="26" rx="6"/>
    <text x="10" y="18" class="title">1. Before</text>
    <circle class="person" cx="48" cy="78" r="11"/>
    <line class="person" x1="48" y1="89" x2="48" y2="140"/>
    <line class="person" x1="48" y1="100" x2="84" y2="92"/>
    <line class="person" x1="48" y1="100" x2="30" y2="120"/>
    <line class="person" x1="48" y1="140" x2="34" y2="172"/>
    <line class="person" x1="48" y1="140" x2="62" y2="172"/>
    <g transform="translate(86,72)">
      <line class="palm" x1="0" y1="22" x2="0" y2="2"/>
      <line class="palm" x1="0" y1="22" x2="10" y2="4"/>
      <line class="palm" x1="0" y1="22" x2="-10" y2="4"/>
      <line class="palm" x1="0" y1="22" x2="18" y2="14"/>
    </g>
    <line class="floor" x1="120" y1="175" x2="225" y2="175"/>
    <rect class="agentBody" x="160" y="138" width="22" height="30" rx="3"/>
    <circle class="agentBody" cx="171" cy="128" r="10"/>
    <text x="10" y="218" class="cap">The user raises an open palm.</text>
    <text x="10" y="233" class="cap">This puts the system into a</text>
    <text x="10" y="248" class="cap">command ready state.</text>
  </g>

  <g transform="translate(275,38)">
    <rect class="panel" width="240" height="250" rx="6"/>
    <rect class="bar" width="240" height="26" rx="6"/>
    <text x="10" y="18" class="title">2. Swipe</text>
    <g transform="translate(60,90)">
      <line class="palm" x1="0" y1="22" x2="0" y2="2"/>
      <line class="palm" x1="0" y1="22" x2="10" y2="4"/>
      <line class="palm" x1="0" y1="22" x2="-10" y2="4"/>
    </g>
    <line class="swipe" x1="70" y1="112" x2="190" y2="112" marker-end="url(#ah2)"/>
    <text x="92" y="100" class="label">swipe right</text>
    <text x="10" y="218" class="cap">The user sweeps the palm in a</text>
    <text x="10" y="233" class="cap">direction. The motion vector</text>
    <text x="10" y="248" class="cap">becomes the command.</text>
  </g>

  <g transform="translate(530,38)">
    <rect class="panel" width="240" height="250" rx="6"/>
    <rect class="bar" width="240" height="26" rx="6"/>
    <text x="10" y="18" class="title">3. Preview</text>
    <line class="swipe" x1="40" y1="120" x2="200" y2="120" marker-end="url(#ah2)"/>
    <text x="62" y="108" class="label">interpreted direction</text>
    <text x="10" y="218" class="cap">The system shows the direction</text>
    <text x="10" y="233" class="cap">it read from the swipe so the</text>
    <text x="10" y="248" class="cap">user can confirm intent.</text>
  </g>

  <g transform="translate(785,38)">
    <rect class="panel" width="240" height="250" rx="6"/>
    <rect class="bar" width="240" height="26" rx="6"/>
    <text x="10" y="18" class="title">4. After</text>
    <line class="floor" x1="20" y1="175" x2="225" y2="175"/>
    <line class="swipe" x1="40" y1="160" x2="150" y2="160" marker-end="url(#ah2)"/>
    <rect class="agentBody" x="158" y="138" width="22" height="30" rx="3"/>
    <circle class="agentBody" cx="169" cy="128" r="10"/>
    <text x="10" y="218" class="cap">The agent moves along the</text>
    <text x="10" y="233" class="cap">swipe. This is fast but easier</text>
    <text x="10" y="248" class="cap">to trigger by accident.</text>
  </g>

  <defs>
    <marker id="ah2" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#e0473c"/>
    </marker>
  </defs>
</svg>
