<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360">
  <rect width="1400" height="360" fill="#f7f7fb"/>
  <style>
    text{font-family:Arial,sans-serif;fill:#182230}
    .title{font-size:28px;font-weight:bold}
    .label{font-size:18px}
    .panel{fill:white;stroke:#c7d2fe;stroke-width:3;rx:18}
    .accent{stroke:#2563eb;stroke-width:8;stroke-linecap:round}
    .agent{fill:#2563eb}
    .target{fill:#22c55e}
  </style>
  <text x="30" y="42" class="title">Storyboard 1 - Point + pinch confirmation (implemented)</text>
  <g transform="translate(30,70)">
    <rect class="panel" x="0" y="0" width="310" height="240"/>
    <circle cx="70" cy="170" r="24" class="agent"/>
    <path d="M190 150 L260 105" class="accent"/>
    <circle cx="260" cy="105" r="12" class="target"/>
    <text x="18" y="32" class="label">1. User points right index</text>
    <text x="18" y="210" class="label">Agent waits; aim ray appears.</text>
  </g>
  <g transform="translate(365,70)">
    <rect class="panel" x="0" y="0" width="310" height="240"/>
    <circle cx="70" cy="170" r="24" class="agent"/>
    <path d="M190 150 L260 105" class="accent"/>
    <circle cx="260" cy="105" r="18" fill="none" stroke="#22c55e" stroke-width="7"/>
    <text x="18" y="32" class="label">2. Reticle lands on floor</text>
    <text x="18" y="210" class="label">Destination is previewed first.</text>
  </g>
  <g transform="translate(700,70)">
    <rect class="panel" x="0" y="0" width="310" height="240"/>
    <circle cx="70" cy="170" r="24" class="agent"/>
    <circle cx="215" cy="105" r="16" fill="#f59e0b"/>
    <circle cx="244" cy="105" r="16" fill="#f59e0b"/>
    <line x1="215" y1="105" x2="244" y2="105" stroke="#f59e0b" stroke-width="12"/>
    <text x="18" y="32" class="label">3. Left thumb-index pinch</text>
    <text x="18" y="210" class="label">Pinch explicitly commits command.</text>
  </g>
  <g transform="translate(1035,70)">
    <rect class="panel" x="0" y="0" width="310" height="240"/>
    <circle cx="190" cy="145" r="24" class="agent"/>
    <circle cx="260" cy="105" r="12" class="target"/>
    <path d="M90 170 C125 170,150 160,180 145" stroke="#2563eb" stroke-width="6" fill="none" stroke-dasharray="10 10"/>
    <text x="18" y="32" class="label">4. Agent walks to target</text>
    <text x="18" y="210" class="label">Stops if a wall proxy blocks it.</text>
  </g>
</svg>
